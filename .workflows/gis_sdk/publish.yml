trigger: none
pr: none

pool:
  name: "DAS-SGLA"

variables:
  - group: Credentials
  - name: "package_path"
    value: "agro_gis_sdk"

resources:
  repositories:
    - repository: workflows
      type: git
      name: agronext_workflows

jobs:
  - template: publish.yml@workflows
    parameters:
      package_path: "$(package_path)"
