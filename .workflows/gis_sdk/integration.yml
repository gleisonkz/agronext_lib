trigger:
  branches:
    include:
      - main
  paths:
    include:
      - agro_gis_sdk/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - "agro_gis_sdk/**"

pool:
  name: "AgroNext-Linux-Python"

variables:
  - name: "package_path"
    value: "agro_gis_sdk"

resources:
  repositories:
    - repository: workflows
      type: git
      name: agronext_workflows

jobs:
  - template: integration.yml@workflows
    parameters:
      package_path: "$(package_path)"
