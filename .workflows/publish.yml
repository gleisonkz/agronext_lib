trigger:
- main

pool:
  name: 'DAS-SGLA'
strategy:
  matrix:
    Python37:
      python.version: '3.7'
    Python38:
      python.version: '3.8'
    Python39:
      python.version: '3.9'
    Python310:
      python.version: '3.10'
    Python311:
      python.version: '3.11'
    Python312:
      python.version: '3.12'


steps:
- task: UsePythonVersion@0
  inputs:
    versionSpec: '$(python.version)'
    allowUnstable: true
  displayName: 'Use Python $(python.version)'
