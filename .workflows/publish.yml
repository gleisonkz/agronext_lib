trigger:
  - none

pr: 
  branches:
    include:
      - main
      - development
  paths:
    exclude:
      - './workflows/**'

pool:
  name: "DAS-SGLA"

resources:
  repositories:
    - repository: workflows
      type: git
      name: agronext_workflows

variables:
  - group: Credentials

jobs:
  - template: publish.yml@workflows
    parameters:
      package_path: './agronext_api'
