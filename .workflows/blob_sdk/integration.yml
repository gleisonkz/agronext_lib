trigger:
  branches:
    include:
      - main
  paths:
    include:
      - blob_storage_sdk/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - "blob_storage_sdk/**"

pool:
  name: "DAS-SGLA"

variables:
  - name: "package_path"
    value: "blob_storage_sdk"

resources:
  repositories:
    - repository: workflows
      type: git
      name: agronext_workflows

jobs:
  - template: integration.yml@workflows
    parameters:
      package_path: "$(package_path)"
