[tool.poetry]
name = "agronext-api"
version = "0.0.2"
description = "Agronext FastAPI Wrapper"
authors = ["Cristovam Silva <cristovam.lage@essor.com.br>"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.12"
fastapi = "^0.115.2"
uvicorn = "^0.32.0"
pydantic-settings = "^2.6.0"
pydantic = "^2.9.2"
fastapi-pagination = "^0.12.31"


[[tool.poetry.source]]
name = "artifactory"
url = "http://artifactory.eu.scor.local:8081/artifactory/api/pypi/pypi"
priority = "primary"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
