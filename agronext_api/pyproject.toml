[tool.poetry]
name = "agronext-api"
version = "0.0.4"
description = "Agronext FastAPI Wrapper"
authors = ["Cristovam Silva <cristovam.lage@essor.com.br>"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.12"
fastapi = "^0.115.2"
uvicorn = "^0.32.0"
pydantic-settings = "^2.6.0"
pydantic = "^2.9.2"
fastapi-pagination = "^0.12.31"
msal = "^1.31.0"
fastapi-azure-auth = "^5.0.1"
httpx = "^0.28.1"

[tool.poetry.dev-dependencies]
pytest = "^8.3.4"
pytest-mock = "^3.14.0"
pytest-asyncio = "^0.24.0"


[[tool.poetry.source]]
name = "artifactory"
url = "http://artifactory.eu.scor.local:8081/artifactory/api/pypi/pypi"
priority = "supplemental"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
