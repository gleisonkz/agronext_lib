[tool.poetry]
name = "agronext-api"
version = "0.0.1"
description = "Agronext FastAPI Wrapper"
authors = ["Cristovam Silva <cristovam.lage@essor.com.br>"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.12"
fastapi = "^0.115.2"
uvicorn = "^0.32.0"
pydantic-settings = "^2.6.0"
pydantic = "^2.9.2"
fastapi-pagination = "^0.12.31"
msal = "^1.31.0"
pyjwt = "^2.9.0"


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
